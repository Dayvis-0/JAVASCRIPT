    <body>
        <h1>Block Scope</h1>
        <!--Las variables declaradas con 'let' o 'cont' dentro de un bloque ( por ejemplo,
        dentro de una sentencia 'if' o un bucle) tiene un ámbito de bloque. Solo se puede
        acceder a ellas dentro de ese bloque.-->
        <p>
            Variables declared with let or const inside a block (e.g., inside an if statement 
            or a loop) have block scope. They are only accessible within that block.
        </p>
